<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Ad Agency — Pipeline</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #d4a853;
    --success: #4caf7d;
    --danger: #e05252;
    --info: #5b9bd5;
    --warning: #e08a30;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  .container { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem; }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2rem;
  }
  .logo { font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: 0.02em; }
  .status-dot {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted);
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .dot.ok { background: var(--success); }
  .dot.err { background: var(--danger); }

  .stages {
    display: flex; gap: 0; margin-bottom: 2rem;
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden;
  }
  .stage {
    flex: 1; padding: 10px 8px; text-align: center;
    font-size: 11px; color: var(--muted);
    border-right: 1px solid var(--border);
    background: var(--surface);
  }
  .stage:last-child { border-right: none; }
  .stage.active { background: var(--surface2); color: var(--accent); font-weight: 600; }
  .stage.done { color: var(--success); }
  .stage-num { font-size: 10px; display: block; margin-bottom: 2px; opacity: 0.6; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .card-label {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .card-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .card-desc { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; }

  .tabs {
    display: flex; gap: 0; margin-bottom: 1rem;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    width: fit-content; overflow: hidden;
  }
  .tab {
    padding: 7px 18px; font-size: 12px; cursor: pointer;
    background: transparent; border: none; color: var(--muted);
    font-family: inherit; border-right: 1px solid var(--border);
  }
  .tab:last-child { border-right: none; }
  .tab.active { background: var(--accent); color: #000; font-weight: 600; }
  .tab:hover:not(.active) { background: var(--surface2); color: var(--text); }

  .drop-zone {
    border: 1.5px dashed var(--border); border-radius: var(--radius);
    padding: 2.5rem; text-align: center; cursor: pointer;
    margin-bottom: 1rem; transition: border-color 0.15s, background 0.15s;
  }
  .drop-zone:hover, .drop-zone.over { border-color: var(--accent); background: rgba(212,168,83,0.05); }
  .drop-zone .icon { font-size: 28px; margin-bottom: 10px; }
  .drop-zone strong { display: block; font-size: 14px; margin-bottom: 4px; }
  .drop-zone span { font-size: 12px; color: var(--muted); }

  .file-ready {
    display: flex; align-items: center; gap: 10px;
    background: rgba(76,175,125,0.1); border: 1px solid rgba(76,175,125,0.3);
    border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 1rem;
    font-size: 13px;
  }
  .file-ready .check { color: var(--success); font-size: 16px; }

  textarea {
    width: 100%; min-height: 140px; resize: vertical;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px;
    color: var(--text); font-family: inherit; font-size: 13px;
    line-height: 1.6; margin-bottom: 1rem;
  }
  textarea:focus { outline: none; border-color: var(--accent); }

  .output {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 1rem;
    font-size: 13px; line-height: 1.8; white-space: pre-wrap;
    max-height: 480px; overflow-y: auto; margin-bottom: 1rem;
    font-family: "SF Mono", "Fira Code", monospace;
    color: #d4d4d4;
  }

  .edit-area {
    width: 100%; min-height: 240px; resize: vertical;
    background: var(--surface2); border: 1px solid var(--accent);
    border-radius: var(--radius-sm); padding: 12px;
    color: var(--text); font-family: "SF Mono", "Fira Code", monospace;
    font-size: 13px; line-height: 1.6; margin-bottom: 1rem;
  }
  .edit-area:focus { outline: none; }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  button {
    padding: 9px 18px; border-radius: var(--radius-sm); font-size: 13px;
    font-family: inherit; font-weight: 500; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); transition: all 0.15s;
  }
  button:hover { background: var(--surface); border-color: var(--muted); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-primary:hover { background: #e0b55e; }
  .btn-success { background: rgba(76,175,125,0.15); color: var(--success); border-color: rgba(76,175,125,0.4); }
  .btn-success:hover { background: rgba(76,175,125,0.25); }
  .btn-danger { background: rgba(224,82,82,0.15); color: var(--danger); border-color: rgba(224,82,82,0.4); }

  .flag {
    padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 12px; margin-bottom: 1rem;
  }
  .flag-warn { background: rgba(224,138,48,0.15); color: var(--warning); border: 1px solid rgba(224,138,48,0.3); }
  .flag-info { background: rgba(91,155,213,0.15); color: var(--info); border: 1px solid rgba(91,155,213,0.3); }

  .concept-grid {
    display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem;
  }
  .concept-card {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .concept-card:hover { border-color: var(--accent); background: rgba(212,168,83,0.05); }
  .concept-card.selected { border-color: var(--accent); background: rgba(212,168,83,0.1); }
  .concept-card-title { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .concept-card-logline { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .concept-card-arc { font-size: 11px; color: var(--info); margin-top: 4px; }

  .spinner {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid currentColor; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin-right: 6px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .progress-info { font-size: 12px; color: var(--muted); margin-bottom: 1rem; }
</style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <div class="logo">Video Ad Agency — Pipeline</div>
    <div class="status-dot">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Checking server...</span>
    </div>
  </div>

  <div class="stages" id="stages"></div>
  <div id="main"></div>

</div>

<input type="file" id="pdf-input" accept=".pdf" style="display:none">

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// Auto-detect: if served from Railway (non-localhost), API calls go to same origin
const SERVER = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:8765'
  : window.location.origin;

const AGENTS = [
  { id: 'brief',      name: 'Brief analyst',          desc: 'Extracts brand, audience, objective, tone, and generates candidate insights' },
  { id: 'concept',    name: 'Concept ideator',         desc: 'Generates 3-5 ad concepts — approve or edit before passing to script' },
  { id: 'script',     name: 'Script writer',           desc: 'Full production-ready script, second by second' },
  { id: 'sound',      name: 'Sound brief writer',      desc: 'Music direction, sound design spec, silence map, sync points' },
  { id: 'visual',     name: 'Visual prompt writer',    desc: 'AI video/image prompts per scene — Runway, Kling, or real footage' },
  { id: 'production', name: 'Production coordinator',  desc: 'Final production brief for Indrajeet — flags blocking issues' }
];

let state = {
  stage: 0,
  inputTab: 'paste',
  brief: '',
  pdfText: '',
  pdfName: '',
  pdfExtracting: false,
  outputs: [],
  editMode: false,
  editContent: '',
  loading: false,
  error: null,
  complete: false,
  serverOk: false,
  selectingConcept: false,
  selectedConcept: null,
  parsedConcepts: []
};

async function checkServer() {
  try {
    const r = await fetch(`${SERVER}/health`, { signal: AbortSignal.timeout(5000) });
    const d = await r.json();
    state.serverOk = true;
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    dot.className = 'dot ok';
    if (!d.api_key_set) {
      txt.textContent = 'Server running — API key missing';
      dot.className = 'dot err';
    } else {
      txt.textContent = 'Server connected';
    }
  } catch {
    state.serverOk = false;
    document.getElementById('status-dot').className = 'dot err';
    document.getElementById('status-text').textContent = 'Server not running';
  }
  render();
}

function render() {
  renderStages();
  renderMain();
}

function renderStages() {
  document.getElementById('stages').innerHTML = AGENTS.map((a, i) => {
    let cls = 'stage';
    if (i < state.stage || state.complete) cls += ' done';
    else if (i === state.stage) cls += ' active';
    const check = (i < state.stage || state.complete) ? '✓ ' : '';
    return `<div class="${cls}"><span class="stage-num">${i+1}</span>${check}${a.name}</div>`;
  }).join('');
}

function renderMain() {
  const s = state;
  let html = '';

  if (!s.serverOk) {
    html = `<div class="card">
      <div class="card-label">Setup required</div>
      <div class="card-title">Start the local server first</div>
      <div class="card-desc">The pipeline needs a local server running to call the Anthropic API securely.</div>
      <div class="flag flag-info">
        Open your terminal and run:<br><br>
        <strong>1. Set your API key:</strong><br>
        <code>export ANTHROPIC_API_KEY=your-key-here</code><br><br>
        <strong>2. Start the server:</strong><br>
        <code>cd ~/Downloads/agency-pipeline && python3 server.py</code><br><br>
        Then refresh this page.
      </div>
      <button onclick="checkServer()">Check again</button>
    </div>`;
    document.getElementById('main').innerHTML = html;
    return;
  }

  if (s.complete) {
    html = `<div class="card">
      <div class="card-label">Pipeline complete</div>
      <div class="card-title">Production brief ready for Indrajeet</div>
      <div class="output">${esc(s.outputs[5])}</div>
      <div class="btn-row">
        <button class="btn-success" onclick="copyFinal()">Copy full brief</button>
        <button onclick="resetAll()">Start new brief</button>
      </div>
    </div>`;
    document.getElementById('main').innerHTML = html;
    return;
  }

  const agent = AGENTS[s.stage];

  if (s.stage === 0 && !s.outputs[0]) {
    const isPaste = s.inputTab === 'paste';
    let inputHtml = '';
    if (isPaste) {
      inputHtml = `<textarea id="bta" placeholder="Paste your client brief here...">${esc(s.brief)}</textarea>`;
    } else {
      if (s.pdfExtracting) {
        inputHtml = `<div class="flag flag-info"><span class="spinner"></span>Extracting text from PDF...</div>`;
      } else if (s.pdfName && s.pdfText) {
        inputHtml = `<div class="file-ready"><span class="check">✓</span><span><strong>${esc(s.pdfName)}</strong> — ${s.pdfText.length.toLocaleString()} characters extracted</span></div>`;
      } else {
        inputHtml = `<div class="drop-zone" id="dz">
          <div class="icon">📄</div>
          <strong>Drop PDF here or click to browse</strong>
          <span>Extracted text feeds directly into Brief Analyst</span>
        </div>`;
      }
    }

    html = `<div class="card">
      <div class="card-label">Step 1 of 6</div>
      <div class="card-title">${agent.name}</div>
      <div class="card-desc">${agent.desc}</div>
      <div class="tabs">
        <button class="tab ${isPaste?'active':''}" onclick="setTab('paste')">Paste text</button>
        <button class="tab ${!isPaste?'active':''}" onclick="setTab('pdf')">Upload PDF</button>
      </div>
      ${inputHtml}
      ${s.error ? `<div class="flag flag-warn">${esc(s.error)}</div>` : ''}
      <div class="btn-row">
        <button class="btn-primary" onclick="runAgent()" ${s.loading||s.pdfExtracting?'disabled':''}>
          ${s.loading ? '<span class="spinner"></span>Running Brief Analyst...' : 'Run Brief Analyst'}
        </button>
      </div>
    </div>`;

  } else if (s.outputs[s.stage] && !s.editMode) {

    // Special case: after concept ideator, show selection UI
    if (s.stage === 1 && !s.selectedConcept) {
      const concepts = parseConcepts(s.outputs[1]);
      html = `<div class="card">
        <div class="card-label">Step 2 of 6 — pick your concept</div>
        <div class="card-title">Choose a concept</div>
        <div class="card-desc">Select the concept to develop into a full script. Only this concept passes forward.</div>
        <div class="concept-grid">
          ${concepts.map((c, i) => `
            <div class="concept-card ${s.parsedConcepts[i] === s.selectedConcept ? 'selected' : ''}" onclick="selectConcept(${i})">
              <div class="concept-card-title">${esc(c.title)}</div>
              <div class="concept-card-logline">${esc(c.logline)}</div>
              ${c.arc ? `<div class="concept-card-arc">Arc: ${esc(c.arc)}</div>` : ''}
            </div>
          `).join('')}
        </div>
        ${s.error ? `<div class="flag flag-warn">${esc(s.error)}</div>` : ''}
        <div class="btn-row">
          <button class="btn-success" onclick="approveWithConcept()" ${!s.selectedConcept ? 'disabled' : ''}>Use selected concept → Script Writer</button>
          <button onclick="enterEdit()">Edit full output instead</button>
        </div>
      </div>`;
      // Store parsed concepts
      state.parsedConcepts = concepts.map(c => c.full);
      document.getElementById('main').innerHTML = html;
      return;
    }
    // All other stages — standard output view
    html = `<div class="card">
      <div class="card-label">Step ${s.stage+1} of 6 — output ready</div>
      <div class="card-title">${agent.name}</div>
      <div class="card-desc">${agent.desc}</div>
      <div class="output">${esc(s.outputs[s.stage])}</div>
      ${s.error ? `<div class="flag flag-warn">${esc(s.error)}</div>` : ''}
      <div class="btn-row">
        <button class="btn-success" onclick="approve()">Approve — run next agent</button>
        <button onclick="enterEdit()">Edit before passing</button>
        <button onclick="rerun()">Regenerate</button>
      </div>
    </div>`;

  } else if (s.editMode) {
    html = `<div class="card">
      <div class="card-label">Step ${s.stage+1} of 6 — editing output</div>
      <div class="card-title">Edit ${agent.name} output</div>
      <div class="card-desc">Make changes. This version passes to the next agent.</div>
      <textarea class="edit-area" id="eta">${esc(s.editContent)}</textarea>
      <div class="btn-row">
        <button class="btn-success" onclick="saveEdit()">Save and continue</button>
        <button onclick="cancelEdit()">Cancel</button>
      </div>
    </div>`;

  } else {
    html = `<div class="card">
      <div class="card-label">Step ${s.stage+1} of 6</div>
      <div class="card-title">${agent.name}</div>
      <div class="card-desc">${agent.desc}</div>
      ${s.error ? `<div class="flag flag-warn">${esc(s.error)}</div>` : ''}
      <div class="btn-row">
        <button class="btn-primary" onclick="runAgent()" ${s.loading?'disabled':''}>
          ${s.loading ? `<span class="spinner"></span>Running ${agent.name}...` : `Run ${agent.name}`}
        </button>
      </div>
    </div>`;
  }

  document.getElementById('main').innerHTML = html;

  const bta = document.getElementById('bta');
  if (bta) bta.addEventListener('input', e => { state.brief = e.target.value; });
  const eta = document.getElementById('eta');
  if (eta) { eta.value = state.editContent; eta.addEventListener('input', e => { state.editContent = e.target.value; }); }

  const dz = document.getElementById('dz');
  if (dz) {
    dz.addEventListener('click', () => document.getElementById('pdf-input').click());
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('over'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
  }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setTab(t) { state.inputTab = t; state.error = null; render(); }

document.getElementById('pdf-input').addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); e.target.value = ''; });

async function handleFile(file) {
  if (!file || file.type !== 'application/pdf') { state.error = 'Please upload a PDF file.'; render(); return; }
  state.pdfName = file.name; state.pdfText = ''; state.pdfExtracting = true; state.error = null; render();
  try {
    const ab = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    let text = '';
    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      text += content.items.map(i => i.str).join(' ') + '\n';
    }
    text = text.replace(/\s{3,}/g, ' ').trim();
    if (text.length < 50) throw new Error('Very little text found — PDF may be image-based. Try pasting instead.');
    state.pdfText = text; state.pdfExtracting = false; render();
  } catch(e) {
    state.pdfExtracting = false; state.pdfName = ''; state.error = e.message; render();
  }
}

async function runAgent() {
  state.error = null;
  const agent = AGENTS[state.stage];
  let content = '';

  if (state.stage === 0) {
    if (state.inputTab === 'pdf') {
      if (!state.pdfText) { state.error = 'No PDF text found. Try pasting instead.'; render(); return; }
      content = `CLIENT BRIEF (from PDF: ${state.pdfName}):\n\n${state.pdfText}`;
    } else {
      if (!state.brief.trim()) { state.error = 'Please paste a brief or upload a PDF.'; render(); return; }
      content = `CLIENT BRIEF:\n\n${state.brief}`;
    }
  } else {
    content = state.outputs.slice(0, state.stage)
      .map((o, i) => `${AGENTS[i].name.toUpperCase()} OUTPUT:\n\n${o}`)
      .join('\n\n---\n\n');
  }

  state.loading = true; render();

  try {
    const res = await fetch(`${SERVER}/run-agent`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent: agent.id, content })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `Server error ${res.status}`);
    state.outputs[state.stage] = data.result;
    state.loading = false; render();
  } catch(e) {
    state.loading = false;
    state.error = `Error: ${e.message}`;
    render();
  }
}

function parseConcepts(text) {
  const concepts = [];
  // Split on CONCEPT [N]: or CONCEPT N:
  const blocks = text.split(/(?=CONCEPT\s+\[?\d+\]?\s*[:—])/i).filter(b => b.trim());
  for (const block of blocks) {
    const titleMatch = block.match(/CONCEPT\s+\[?\d+\]?\s*[:—]\s*(.+)/i);
    const loglineMatch = block.match(/LOGLINE\s*[:—]\s*(.+)/i);
    const arcMatch = block.match(/EMOTIONAL ARC\s*[:—]\s*(.+)/i);
    if (titleMatch) {
      concepts.push({
        title: titleMatch[1].trim(),
        logline: loglineMatch ? loglineMatch[1].trim() : block.split('\n').slice(1,3).join(' ').trim().substring(0, 120),
        arc: arcMatch ? arcMatch[1].trim() : '',
        full: block.trim()
      });
    }
  }
  // Fallback: if parsing fails, show full text as one selectable block
  if (concepts.length === 0) {
    concepts.push({ title: 'Full concept output', logline: text.substring(0, 150) + '...', arc: '', full: text });
  }
  return concepts;
}

function selectConcept(i) {
  const concepts = parseConcepts(state.outputs[1]);
  state.parsedConcepts = concepts.map(c => c.full);
  state.selectedConcept = state.parsedConcepts[i];
  render();
}

function approveWithConcept() {
  if (!state.selectedConcept) { state.error = 'Please select a concept first.'; render(); return; }
  // Replace the concept output with just the selected concept before passing forward
  state.outputs[1] = `SELECTED CONCEPT:\n\n${state.selectedConcept}`;
  state.selectedConcept = null;
  state.stage++;
  state.editMode = false;
  state.error = null;
  render();
}

function approve() {
  if (state.stage < AGENTS.length - 1) { state.stage++; state.editMode = false; state.error = null; render(); }
  else { state.complete = true; render(); }
}
function enterEdit() { state.editContent = state.outputs[state.stage]; state.editMode = true; render(); }
function saveEdit() { state.outputs[state.stage] = state.editContent; state.editMode = false; approve(); }
function cancelEdit() { state.editMode = false; render(); }
function rerun() { state.outputs[state.stage] = null; state.error = null; runAgent(); }
function copyFinal() { navigator.clipboard.writeText(state.outputs[5]||'').then(() => alert('Copied to clipboard!')); }
function resetAll() {
  state = { stage:0, inputTab:'paste', brief:'', pdfText:'', pdfName:'', pdfExtracting:false, outputs:[], editMode:false, editContent:'', loading:false, error:null, complete:false, serverOk:state.serverOk };
  render();
}

checkServer();
setInterval(checkServer, 15000);
</script>
</body>
</html>
